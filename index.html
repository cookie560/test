<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG Master Guide | 頂尖訓練家學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .text-gradient { background: linear-gradient(to right, #3b82f6, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 模擬卡牌邊框閃爍 */
        .ptcg-card { position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .ptcg-card:hover { transform: scale(1.02) translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .ptcg-card::after { content: ''; position: absolute; inset: 0; border-radius: 1.5rem; border: 2px solid transparent; transition: border 0.3s; }
        .ptcg-card:hover::after { border-color: #3b82f6; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800">

    <nav class="glass-nav fixed top-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-bolt text-xs"></i>
                </div>
                <span class="font-black text-xl tracking-tight italic">PTCG<span class="text-blue-600">ACADEMY</span></span>
            </div>
            <div id="nav-steps" class="hidden md:flex gap-8 text-sm font-bold text-slate-400">
                <button onclick="showPage(1)" id="n1" class="hover:text-slate-600 transition">01. 規則</button>
                <button onclick="showPage(2)" id="n2" class="hover:text-slate-600 transition">02. 卡牌</button>
                <button onclick="showPage(3)" id="n3" class="hover:text-slate-600 transition">03. 流程</button>
                <button onclick="showPage(4)" id="n4" class="hover:text-slate-600 transition">04. 構築</button>
            </div>
            <a href="#" class="bg-slate-900 text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-blue-600 transition shadow-md">
                <i class="fab fa-github mr-2"></i>Source
            </a>
        </div>
    </nav>

    <main class="mt-28 mb-20 px-6 max-w-5xl mx-auto">
        
        <div id="page1" class="page active">
            <div class="text-center mb-16">
                <span class="text-blue-600 font-bold tracking-[0.2em] uppercase text-sm">Chapter 01</span>
                <h1 class="text-5xl font-black mt-2 mb-4 text-slate-900">勝利是唯一的目標</h1>
                <p class="text-slate-500 max-w-xl mx-auto">了解遊戲的核心機制，是成為大師的第一步。這裡有三種終結比賽的方式。</p>
            </div>

            <div class="grid md:grid-cols-3 gap-8">
                <div class="ptcg-card bg-white p-8 rounded-[2rem] shadow-sm">
                    <div class="w-14 h-14 bg-amber-100 rounded-2xl flex items-center justify-center text-amber-600 mb-6">
                        <i class="fas fa-layer-group text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-black mb-3 text-slate-900">獎賞卡系統</h3>
                    <p class="text-slate-500 text-sm leading-relaxed">擊敗對手寶可夢，領取對應數量的獎賞卡。拿完 6 張即獲勝。</p>
                </div>
                <div class="ptcg-card bg-white p-8 rounded-[2rem] shadow-sm">
                    <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center text-red-600 mb-6">
                        <i class="fas fa-ghost text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-black mb-3 text-slate-900">場地清空</h3>
                    <p class="text-slate-500 text-sm leading-relaxed">若對手場上（戰鬥場與備戰區）沒有任何寶可夢時，直接獲勝。</p>
                </div>
                <div class="ptcg-card bg-white p-8 rounded-[2rem] shadow-sm">
                    <div class="w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600 mb-6">
                        <i class="fas fa-book text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-black mb-3 text-slate-900">牌庫空竭</h3>
                    <p class="text-slate-500 text-sm leading-relaxed">對手回合開始無法抽牌時，你將獲得最終勝利。</p>
                </div>
            </div>

            <div id="page5" class="page">
    <div class="text-center mb-10">
        <span class="text-blue-600 font-bold tracking-[0.2em] uppercase text-sm">Certification</span>
        <h1 class="text-4xl font-black mt-2 mb-4 text-slate-900">新手訓練家執照測驗</h1>
        <p class="text-slate-500">證明你已經準備好進入道館戰鬥了！</p>
    </div>

    <div class="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-2xl shadow-blue-100 p-10 relative overflow-hidden">
        <div class="absolute top-0 left-0 h-1 bg-blue-600 transition-all duration-500" id="quiz-progress" style="width: 0%"></div>
        
        <div id="quiz-container">
            <div id="question-box">
                <span class="text-xs font-bold text-blue-500 uppercase tracking-widest" id="q-category">基礎規則</span>
                <h2 class="text-2xl font-bold mt-2 mb-8" id="q-text">加載中...</h2>
                <div class="grid gap-4" id="options-grid">
                    </div>
            </div>
            
            <div id="result-box" class="hidden text-center py-10">
                <div class="text-6xl mb-6" id="result-icon">🏆</div>
                <h3 class="text-3xl font-black mb-2" id="result-title">測驗完成！</h3>
                <p class="text-slate-500 mb-8" id="result-desc">你的得分是 100/100</p>
                <button onclick="location.reload()" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-600 transition">重新挑戰</button>
            </div>
        </div>
    </div>
</div>
            <div class="mt-12 flex justify-center">
                <button onclick="showPage(2)" class="group bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all flex items-center gap-3">
                    繼續下一步 <i class="fas fa-chevron-right group-hover:translate-x-1 transition"></i>
                </button>
            </div>
        </div>

        </main>

    <script>
        function showPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            
            // 更新導航列樣式
            document.querySelectorAll('#nav-steps button').forEach(b => b.classList.replace('text-blue-600', 'text-slate-400'));
            document.getElementById('n' + num).classList.replace('text-slate-400', 'text-blue-600');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        // 初始化第一個按鈕顏色
        document.getElementById('n1').classList.replace('text-slate-400', 'text-blue-600');
    </script>
</body>
</html>
